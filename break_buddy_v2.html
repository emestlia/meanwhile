
<style>
:root {
  --bg: #1c1a17; --bg2: #222018; --bg3: #2a271f; --card: #2e2b22;
  --border: rgba(240,210,140,0.10); --border2: rgba(240,210,140,0.18);
  --amber: #e0a040; --amber-dim: #a07228; --amber-glow: rgba(224,160,64,0.13);
  --amber-light: #f5d080; --green: #7eb87a; --green-bg: rgba(126,184,122,0.13);
  --text: #f0e8d5; --text2: #a89070; --text3: #6a5a42;
  --r: 10px; --rs: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { background: var(--bg); color: var(--text); font-family: 'Baskerville', 'Baskerville Old Face', 'Libre Baskerville', 'Times New Roman', serif; max-width: 400px; margin: 0 auto; border-radius: 16px; border: 0.5px solid var(--border2); overflow: hidden; min-height: 540px; }

.hdr { padding: 1.1rem 1.4rem 0.7rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: baseline; justify-content: space-between; }
.hdr-title { font-size: 17px; color: var(--amber-light); letter-spacing: 0.01em; font-weight: normal; }
.hdr-date { font-size: 11px; color: var(--text3); font-family: sans-serif; }

.nav { display: flex; border-bottom: 0.5px solid var(--border); }
.nav button { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; font-family: 'Baskerville','Baskerville Old Face',serif; font-size: 13px; color: var(--text3); cursor: pointer; padding: 9px 0 7px; transition: all 0.15s; }
.nav button.active { color: var(--amber); border-bottom-color: var(--amber-dim); }

.screen { display: none; padding: 1.25rem 1.4rem; }
.screen.active { display: block; }

/* NUDGE SCREEN */
.nudge-wrap { text-align: center; padding: 0.5rem 0 1rem; }
.nudge-eyebrow { font-family: sans-serif; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 1rem; }
.nudge-habits { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.5rem; }
.habit { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.habit-icon { width: 38px; height: 38px; border-radius: 50%; border: 0.5px solid var(--border2); background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 17px; }
.habit-label { font-family: sans-serif; font-size: 10px; color: var(--text3); }

.divider { border: none; border-top: 0.5px solid var(--border); margin: 0.25rem 0 1.25rem; }

.nudge-prompt { font-size: 12px; font-family: sans-serif; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.6rem; }
.nudge-task { font-size: 22px; color: var(--text); line-height: 1.35; margin-bottom: 1.5rem; font-style: italic; min-height: 60px; }
.nudge-actions { display: flex; flex-direction: column; gap: 8px; }
.btn-done { background: var(--amber-dim); border: none; border-radius: var(--rs); color: var(--bg); font-family: 'Baskerville','Baskerville Old Face',serif; font-size: 15px; padding: 11px; cursor: pointer; width: 100%; transition: opacity 0.15s; }
.btn-done:hover { opacity: 0.88; }
.btn-meeting { background: none; border: 0.5px solid var(--border2); border-radius: var(--rs); color: var(--text3); font-family: sans-serif; font-size: 12px; padding: 9px; cursor: pointer; width: 100%; transition: all 0.15s; }
.btn-meeting:hover { color: var(--text2); border-color: var(--border2); }
.btn-skip { background: none; border: none; color: var(--text3); font-family: sans-serif; font-size: 11px; padding: 6px; cursor: pointer; text-decoration: underline; text-decoration-color: var(--border2); }

.idle-state { text-align: center; padding: 2rem 1rem; }
.idle-ring { width: 110px; height: 110px; margin: 0 auto 1rem; }
.idle-ring circle.bg { fill: none; stroke: var(--border2); stroke-width: 7; }
.idle-ring circle.fg { fill: none; stroke: var(--amber); stroke-width: 7; stroke-linecap: round; stroke-dasharray: 283; transition: stroke-dashoffset 1s linear; transform: rotate(-90deg); transform-origin: 55px 55px; }
.idle-time { font-size: 22px; color: var(--text); }
.idle-sub { font-family: sans-serif; font-size: 11px; color: var(--text3); margin-top: 4px; }
.idle-btns { display: flex; gap: 8px; justify-content: center; margin-top: 1rem; }
.idle-btns button { padding: 7px 18px; border-radius: var(--rs); font-size: 12px; font-family: sans-serif; cursor: pointer; border: 0.5px solid var(--border2); background: none; color: var(--text2); }
.idle-btns button.go { background: var(--amber-dim); border-color: transparent; color: var(--bg); }
.interval-row { display: flex; align-items: center; gap: 10px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--rs); padding: 9px 12px; margin-top: 1rem; }
.interval-row label { font-family: sans-serif; font-size: 12px; color: var(--text2); flex: 1; }
.interval-row select { background: var(--card); border: 0.5px solid var(--border2); border-radius: 4px; color: var(--text); font-size: 12px; padding: 3px 7px; font-family: sans-serif; }

/* TASK POOL */
.slabel { font-family: sans-serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; margin-top: 1.1rem; }
.slabel:first-child { margin-top: 0; }
.pool-item { display: flex; align-items: center; gap: 8px; padding: 9px 11px; background: var(--card); border: 0.5px solid var(--border); border-radius: var(--rs); margin-bottom: 5px; }
.pool-name { flex: 1; font-size: 14px; color: var(--text); }
.pool-badge { font-family: sans-serif; font-size: 10px; color: var(--amber-dim); background: var(--amber-glow); border-radius: 4px; padding: 2px 6px; }
.pool-del { background: none; border: none; color: var(--text3); font-size: 15px; cursor: pointer; padding: 0 2px; line-height: 1; }
.add-row { display: flex; gap: 6px; margin-top: 8px; }
.add-row input, .add-row select { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--rs); color: var(--text); font-family: 'Baskerville',serif; font-size: 13px; padding: 7px 9px; }
.add-row input { flex: 1; }
.add-row select { font-family: sans-serif; font-size: 11px; }
.add-row button { background: var(--amber-dim); border: none; border-radius: var(--rs); color: var(--bg); font-size: 18px; width: 34px; cursor: pointer; flex-shrink: 0; }

/* VICTORIES */
.v-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin-bottom: 1rem; }
.v-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--rs); padding: 11px 8px; text-align: center; }
.v-num { font-size: 24px; color: var(--amber-light); }
.v-lbl { font-family: sans-serif; font-size: 10px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.streak { background: var(--amber-glow); border: 0.5px solid var(--amber-dim); border-radius: var(--rs); padding: 9px 13px; display: flex; align-items: center; gap: 9px; margin-bottom: 1rem; }
.streak span { font-family: sans-serif; font-size: 13px; color: var(--amber); }
.log-item { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
.log-task { font-size: 13px; color: var(--text2); }
.log-time { font-family: sans-serif; font-size: 11px; color: var(--text3); }

/* deferred state */
.deferred-banner { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--rs); padding: 10px 13px; text-align: center; margin-bottom: 1rem; }
.deferred-banner p { font-family: sans-serif; font-size: 12px; color: var(--text3); }
.deferred-banner button { margin-top: 8px; background: none; border: 0.5px solid var(--border2); border-radius: var(--rs); color: var(--text2); font-size: 11px; font-family: sans-serif; padding: 5px 12px; cursor: pointer; }
</style>

<div class="app">
  <div class="hdr">
    <span class="hdr-title">break buddy</span>
    <span class="hdr-date" id="hdr-date"></span>
  </div>
  <div class="nav">
    <button class="active" onclick="show('break',this)">break</button>
    <button onclick="show('pool',this)">task pool</button>
    <button onclick="show('victories',this)">victories</button>
  </div>

  <!-- BREAK SCREEN -->
  <div class="screen active" id="screen-break">

    <!-- IDLE state -->
    <div id="idle-state" class="idle-state">
      <svg class="idle-ring" viewBox="0 0 110 110">
        <circle class="bg" cx="55" cy="55" r="45"/>
        <circle class="fg" id="ring-fg" cx="55" cy="55" r="45" stroke-dashoffset="0"/>
      </svg>
      <div class="idle-time" id="timer-display">75:00</div>
      <div class="idle-sub" id="timer-sub">until your next break</div>
      <div class="idle-btns">
        <button class="go" id="start-btn" onclick="toggleTimer()">start</button>
        <button onclick="resetTimer()">reset</button>
      </div>
      <div class="interval-row">
        <label>break every</label>
        <select id="interval-sel" onchange="changeInterval()">
          <option value="30">30 min</option>
          <option value="60">60 min</option>
          <option value="75" selected>75 min</option>
          <option value="90">90 min</option>
          <option value="120">2 hours</option>
        </select>
      </div>
    </div>

    <!-- NUDGE state -->
    <div id="nudge-state" style="display:none">
      <div id="deferred-wrap" style="display:none">
        <div class="deferred-banner">
          <p>break deferred — meeting running long?</p>
          <button onclick="undoDefer()">take the break now</button>
        </div>
      </div>
      <div id="nudge-main" class="nudge-wrap">
        <div class="nudge-eyebrow">time for a 5 min break</div>
        <div class="nudge-habits">
          <div class="habit"><div class="habit-icon">&#9675;</div><div class="habit-label">stretch</div></div>
          <div class="habit"><div class="habit-icon">&#9650;</div><div class="habit-label">water</div></div>
          <div class="habit"><div class="habit-icon">&#9671;</div><div class="habit-label">eyes</div></div>
        </div>
        <hr class="divider">
        <div class="nudge-prompt">while you're up</div>
        <div class="nudge-task" id="nudge-task-text">clean the cat litter</div>
        <div class="nudge-actions">
          <button class="btn-done" onclick="markDone()">done &#10003;</button>
          <button class="btn-skip" onclick="skipTask()">give me a different task</button>
          <button class="btn-meeting" onclick="deferBreak()">i'm in a meeting right now</button>
        </div>
      </div>
    </div>

  </div>

  <!-- TASK POOL -->
  <div class="screen" id="screen-pool">
    <div class="slabel">your task pool</div>
    <div id="pool-list"></div>
    <div class="add-row">
      <input type="text" id="new-task" placeholder="add a task…" onkeydown="if(event.key==='Enter')addTask()">
      <select id="new-recur">
        <option value="daily">daily</option>
        <option value="weekdays">weekdays</option>
        <option value="weekly">weekly</option>
        <option value="anytime">anytime</option>
      </select>
      <button onclick="addTask()">+</button>
    </div>
  </div>

  <!-- VICTORIES -->
  <div class="screen" id="screen-victories">
    <div class="v-stats">
      <div class="v-card"><div class="v-num" id="v-today">0</div><div class="v-lbl">today</div></div>
      <div class="v-card"><div class="v-num" id="v-week">0</div><div class="v-lbl">this week</div></div>
      <div class="v-card"><div class="v-num" id="v-all">0</div><div class="v-lbl">all time</div></div>
    </div>
    <div class="streak"><span id="streak-text">start your streak today</span></div>
    <div class="slabel">recent completions</div>
    <div id="victory-log"><div style="font-family:sans-serif;font-size:12px;color:var(--text3);padding:1rem 0;text-align:center;">no completions yet</div></div>
  </div>
</div>

<script>
  document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});

  let tasks = [
    {name:'clean the cat litter', recur:'daily'},
    {name:'fill water bottle', recur:'daily'},
    {name:'quick desk tidy', recur:'anytime'},
    {name:'reply to that one email', recur:'anytime'},
    {name:'5 min walk outside', recur:'anytime'},
  ];
  let log = [];
  let todayCount = 0, weekCount = 0, allCount = 0;

  function renderPool() {
    const list = document.getElementById('pool-list');
    list.innerHTML = '';
    tasks.forEach((t,i) => {
      const d = document.createElement('div');
      d.className = 'pool-item';
      d.innerHTML = `<span class="pool-name">${t.name}</span><span class="pool-badge">${t.recur}</span><button class="pool-del" onclick="removeTask(${i})">×</button>`;
      list.appendChild(d);
    });
  }

  function addTask() {
    const inp = document.getElementById('new-task');
    const rec = document.getElementById('new-recur').value;
    if (!inp.value.trim()) return;
    tasks.push({name: inp.value.trim(), recur: rec});
    inp.value = '';
    renderPool();
  }

  function removeTask(i) { tasks.splice(i,1); renderPool(); }

  function randomTask() {
    if (!tasks.length) return 'take a moment to rest';
    return tasks[Math.floor(Math.random()*tasks.length)].name;
  }

  document.getElementById('nudge-task-text').textContent = randomTask();

  function skipTask() {
    const el = document.getElementById('nudge-task-text');
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = randomTask(); el.style.opacity = '1'; }, 200);
    el.style.transition = 'opacity 0.2s';
  }

  function markDone() {
    const task = document.getElementById('nudge-task-text').textContent;
    todayCount++; weekCount++; allCount++;
    document.getElementById('v-today').textContent = todayCount;
    document.getElementById('v-week').textContent = weekCount;
    document.getElementById('v-all').textContent = allCount;
    const streak = Math.min(allCount, 4 + allCount);
    document.getElementById('streak-text').textContent = allCount === 1 ? 'first victory today!' : `${allCount} task${allCount>1?'s':''} done — keep going`;
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-CA',{hour:'numeric',minute:'2-digit',hour12:true});
    const entry = document.createElement('div');
    entry.className = 'log-item';
    entry.innerHTML = `<span class="log-task">${task}</span><span class="log-time">today, ${timeStr}</span>`;
    const vlog = document.getElementById('victory-log');
    if (vlog.querySelector('div[style]')) vlog.innerHTML = '';
    vlog.prepend(entry);
    endNudge();
  }

  function deferBreak() {
    document.getElementById('nudge-main').style.display = 'none';
    document.getElementById('deferred-wrap').style.display = 'block';
  }

  function undoDefer() {
    document.getElementById('nudge-main').style.display = 'block';
    document.getElementById('deferred-wrap').style.display = 'none';
    document.getElementById('nudge-task-text').textContent = randomTask();
  }

  function endNudge() {
    document.getElementById('nudge-state').style.display = 'none';
    document.getElementById('idle-state').style.display = 'block';
    document.getElementById('deferred-wrap').style.display = 'none';
    document.getElementById('nudge-main').style.display = 'block';
    remaining = totalSecs;
    running = false;
    clearInterval(timerInterval);
    document.getElementById('start-btn').textContent = 'start';
    document.getElementById('timer-sub').textContent = 'until your next break';
    updateRing();
  }

  function fireNudge() {
    running = false; clearInterval(timerInterval);
    document.getElementById('start-btn').textContent = 'start';
    document.getElementById('nudge-task-text').textContent = randomTask();
    document.getElementById('idle-state').style.display = 'none';
    document.getElementById('nudge-state').style.display = 'block';
  }

  const circumference = 2 * Math.PI * 45;
  let totalSecs = 75*60, remaining = 75*60, running = false, timerInterval = null;

  function fmt(s) { const m=Math.floor(s/60),sec=s%60; return `${m}:${sec.toString().padStart(2,'0')}`; }

  function updateRing() {
    const frac = remaining / totalSecs;
    document.getElementById('ring-fg').style.strokeDashoffset = circumference * (1 - frac);
    document.getElementById('timer-display').textContent = fmt(remaining);
  }

  function toggleTimer() {
    const btn = document.getElementById('start-btn');
    if (!running) {
      running = true; btn.textContent = 'pause';
      timerInterval = setInterval(() => {
        if (remaining <= 0) { fireNudge(); return; }
        remaining--; updateRing();
      }, 1000);
    } else {
      running = false; clearInterval(timerInterval); btn.textContent = 'resume';
    }
  }

  function resetTimer() {
    clearInterval(timerInterval); running = false;
    remaining = totalSecs; updateRing();
    document.getElementById('start-btn').textContent = 'start';
  }

  function changeInterval() {
    totalSecs = parseInt(document.getElementById('interval-sel').value) * 60;
    remaining = totalSecs; updateRing(); resetTimer();
  }

  function show(id, btn) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('screen-'+id).classList.add('active');
    btn.classList.add('active');
  }

  document.getElementById('ring-fg').style.strokeDasharray = circumference;
  updateRing();
  renderPool();
</script>
